<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="resources/favicon.ico" type="image/x-icon" sizes="96x96" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <title>Flip the coin | devChallenges.io</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <h1 class="title">Flip the coin</h1>
    <p class="subtitle">Press the coin or the button to flip the coin</p>

    <div class="coin-container">
      <div class="coin" id="coin">
        <div class="coin-front">
          <img src="resources/heads.svg" alt="Heads" class="coin-image">
        </div>
        <div class="coin-back">
          <img src="resources/tails.svg" alt="Tails" class="coin-image">
        </div>
      </div>
      <img src="resources/shadow.svg" alt="Coin shadow" class="coin-shadow" id="shadow">
    </div>

    <div class="result" id="result">Heads</div>

    <button class="flip-button" id="flipButton">RANDOM</button>
  </main>

  <div class="author-info">
    Coded by <a href="#">Your Name</a> | Challenge by
    <a href="https://www.devchallenges.io?ref=challenge" target="_blank">devChallenges.io</a>.
  </div>

  <script src="script.js"></script>
</body>

</html>
